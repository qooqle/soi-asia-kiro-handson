name: internet-adoption-analysis
# Minimum Python version: 3.10
#
# Create environment:  conda env create -f environment.yml
# Activate:            conda activate internet-adoption-analysis

channels:
  - conda-forge
  - defaults

dependencies:
  - python=3.10

  # HTTP & retry
  - requests=2.32.3
  - tenacity=9.0.0

  # Data manipulation & numerical computing
  - pandas=2.2.3
  - numpy=1.26.4

  # Machine learning (k-means, PCA, silhouette score, StandardScaler)
  - scikit-learn=1.5.2

  # Visualisation
  - matplotlib=3.9.4
  - seaborn=0.13.2
  - pillow=11.1.0

  # Statistics
  - scipy=1.13.1

  # Configuration parsing (YAML)
  - pyyaml=6.0.2

  # Country code utilities (ISO3 → ISO2 mapping)
  - pycountry=24.6.1

  # Testing
  - pytest=8.3.5
  - hypothesis=6.130.5

  # pip-only packages (not available on conda-forge with exact pins)
  - pip
  - pip:
    - textstat==0.7.4
